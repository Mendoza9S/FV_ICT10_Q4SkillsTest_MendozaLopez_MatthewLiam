<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* 1. Background with a soft gradient and shapes */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px;
        }

        /* 2. Glassmorphism Card Style */
        .card {
            background: rgba(255, 255, 255, 0.2); /* Transparent white */
            backdrop-filter: blur(10px); /* The "Frosted" effect */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px; 
            border-radius: 20px; 
            width: 320px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h2 { 
            color: #ffffff; 
            text-align: center; 
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        label { display: block; font-weight: 600; margin-bottom: 8px; color: #ffffff; }

        /* Styling the inputs to match the glass look */
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            outline: none;
        }

        /* 3. A sleek purple-to-pink button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: white;
            background: linear-gradient(to right, #ff00cc, #3333ff);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-submit:hover { 
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 0, 204, 0.4);
        }

        /* 4. Cleaner status message */
        #message {
            margin-top: 20px;
            color: #fff;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }

        /* 5. White graph box for clarity */
        .graph-box {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            min-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="main">
    <div class="card">
        <h2>Attendance Tracker</h2>

        <label for="day">Select Day</label>
        <select id="day">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
        </select>

        <label for="absences">Absences</label>
        <input type="number" id="absences" placeholder="0">

        <button id="submit-btn" class="btn-submit" py-click="handle_submit">Submit</button>

        <div id="message"></div>
    </div>

    <div class="graph-box">
        <div id="graph-output"></div>
    </div>
</div>

<py-config>
    packages = ["matplotlib", "numpy"]
</py-config>

<script type="py" src="main.py"></script>

</body>
</html>
