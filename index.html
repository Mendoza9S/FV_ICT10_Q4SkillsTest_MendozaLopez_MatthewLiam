<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eaeaea;
    }

    h2.title {
        text-align: center;
        margin: 20px 0;
        font-weight: bold;
    }

    .main {
        background: linear-gradient(to right, #1e66d0, #2a73e8);
        padding: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        flex-wrap: wrap;
    }

    .card {
        background: #e8d9b5;
        padding: 25px;
        border-radius: 15px;
        width: 280px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card h3 {
        text-align: center;
        color: #e83e8c;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    select, input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .btn-submit {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-submit:hover {
        background: #c82333;
    }

    .status-bar {
        margin-top: 10px;
        height: 10px;
        background: #28a745;
        border-radius: 5px;
    }

    .graph-box {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        width: 500px;
        max-width: 100%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    .graph-placeholder {
        height: 300px;
        border: 2px dashed #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #888;
        font-size: 14px;
    }

    @media (max-width: 768px) {
        .main {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<h2 class="title">SAMPLE OUTPUT:</h2>

<div class="main">

    <!-- Left Form -->
    <div class="card">
        <h3>Attendance Tracker</h3>

        <label>Select Day</label>
        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <label>Absences</label>
        <input type="number" id="absences" min="0" placeholder="Enter number">

        <button class="btn-submit" onclick="submitData()">Submit</button>

        <div class="status-bar"></div>
    </div>

    <!-- Right Graph -->
    <div class="graph-box">
        <h4>Weekly Attendance (Absences)</h4>
        <div class="graph-placeholder" id="graph">
            Graph will appear here
        </div>
    </div>

</div>



</body>
</html>
